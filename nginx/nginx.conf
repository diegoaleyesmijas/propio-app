# nginx/nginx.conf — Reverse proxy para Barber Booking MVP
# HTTPS con Let's Encrypt (certbot). HTTP → HTTPS.
# Cabeceras de seguridad: HSTS, XFO, XCTO, CSP.

upstream backend {
    server backend:8000;
}

# ── HTTP → redirige a HTTPS ──
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name codigodecaballeros.site www.codigodecaballeros.site 148.230.108.27;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ──
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name codigodecaballeros.site www.codigodecaballeros.site;

    ssl_certificate     /etc/letsencrypt/live/codigodecaballeros.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/codigodecaballeros.site/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── Cabeceras de seguridad ──
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://cdn.esm.sh https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://codigodecaballeros.site;" always;

    # Raíz → reservar.html
    location = / {
        root /usr/share/nginx/html;
        try_files /reservar.html =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
    }

    # Archivos estáticos (HTML y JS con no-store forzar refresh)
    location = /demo.html { return 301 /reservar.html; }
    location /reservar.html { root /usr/share/nginx/html; add_header Cache-Control "no-store, no-cache, must-revalidate"; add_header Pragma "no-cache"; add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always; add_header X-Content-Type-Options "nosniff" always; add_header X-Frame-Options "DENY" always; }
    location /admin.html { root /usr/share/nginx/html; add_header Cache-Control "no-store, no-cache, must-revalidate"; add_header Pragma "no-cache"; add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always; add_header X-Content-Type-Options "nosniff" always; add_header X-Frame-Options "DENY" always; }
    location /demo.js   { root /usr/share/nginx/html; add_header Cache-Control "no-store, no-cache, must-revalidate"; add_header Pragma "no-cache"; add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always; add_header X-Content-Type-Options "nosniff" always; add_header X-Frame-Options "DENY" always; }
    location /admin.js  { root /usr/share/nginx/html; add_header Cache-Control "no-store, no-cache, must-revalidate"; add_header Pragma "no-cache"; add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always; add_header X-Content-Type-Options "nosniff" always; add_header X-Frame-Options "DENY" always; }
    location /i18n.js   { root /usr/share/nginx/html; add_header Cache-Control "no-store, no-cache, must-revalidate"; add_header Pragma "no-cache"; add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always; add_header X-Content-Type-Options "nosniff" always; add_header X-Frame-Options "DENY" always; }
    location /sw.js     { root /usr/share/nginx/html; add_header Cache-Control "no-store, no-cache, must-revalidate"; add_header Pragma "no-cache"; add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always; add_header X-Content-Type-Options "nosniff" always; add_header X-Frame-Options "DENY" always; add_header Service-Worker-Allowed "/"; }
    location /icon.svg  { root /usr/share/nginx/html; add_header Cache-Control "public, max-age=86400"; add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always; }
    location /manifest.json        { root /usr/share/nginx/html; types {} default_type application/manifest+json; add_header Cache-Control "no-cache, must-revalidate"; add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always; }
    location /manifest-booking.json { root /usr/share/nginx/html; types {} default_type application/manifest+json; add_header Cache-Control "no-cache, must-revalidate"; add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always; }
    location /setup.html { root /usr/share/nginx/html; add_header Cache-Control "no-cache, must-revalidate"; add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always; add_header X-Content-Type-Options "nosniff" always; add_header X-Frame-Options "DENY" always; }
    location /admin-panel.url { root /usr/share/nginx/html; add_header Cache-Control "no-cache, must-revalidate"; add_header Content-Disposition "attachment"; }
    location /codigodecaballeros-panel.desktop { root /usr/share/nginx/html; add_header Cache-Control "no-cache, must-revalidate"; add_header Content-Disposition "attachment"; }
    location /logo-web.png { root /usr/share/nginx/html; add_header Cache-Control "public, max-age=86400"; add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always; }
    location /logo-192.png { root /usr/share/nginx/html; add_header Cache-Control "public, max-age=86400"; add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always; }
    location /logo-512.png { root /usr/share/nginx/html; add_header Cache-Control "public, max-age=86400"; add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always; }
    location /favicon.ico   { root /usr/share/nginx/html; add_header Cache-Control "public, max-age=86400"; add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always; }
    location /favicon-16.png { root /usr/share/nginx/html; add_header Cache-Control "public, max-age=86400"; add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always; }
    location /favicon-32.png { root /usr/share/nginx/html; add_header Cache-Control "public, max-age=86400"; add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always; }
    location /favicon-64.png { root /usr/share/nginx/html; add_header Cache-Control "public, max-age=86400"; add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always; }
    location /logo-startup-192.png { root /usr/share/nginx/html; add_header Cache-Control "public, max-age=86400"; add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always; }
    location /logo-startup-512.png { root /usr/share/nginx/html; add_header Cache-Control "public, max-age=86400"; add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always; }
    location /logo-startup.png     { root /usr/share/nginx/html; add_header Cache-Control "public, max-age=86400"; add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always; }
    location /propio-icon.svg     { root /usr/share/nginx/html; add_header Cache-Control "public, max-age=86400"; add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always; }
    location /propio-icon-192.png { root /usr/share/nginx/html; add_header Cache-Control "public, max-age=86400"; add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always; }
    location /propio-icon-512.png { root /usr/share/nginx/html; add_header Cache-Control "public, max-age=86400"; add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always; }
    location /propio-icon-180.png { root /usr/share/nginx/html; add_header Cache-Control "public, max-age=86400"; add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always; }
    location /propio-logo.svg      { root /usr/share/nginx/html; add_header Cache-Control "public, max-age=86400"; add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always; }
    location /propio-logo-white.svg { root /usr/share/nginx/html; add_header Cache-Control "public, max-age=86400"; add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always; }
    location /pwa-icon-192.png     { root /usr/share/nginx/html; add_header Cache-Control "public, max-age=86400"; add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always; }
    location /pwa-icon-512.png     { root /usr/share/nginx/html; add_header Cache-Control "public, max-age=86400"; add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always; }

    # API → backend FastAPI
    location / {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
