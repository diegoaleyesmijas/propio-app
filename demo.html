<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#20B29C" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/propio-icon.svg" />
    <link rel="apple-touch-icon" href="/logo-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              // PROPIO Brand — Verde PROPIO (#20B29C)
              propio: {
                50: '#e8f8f4',
                100: '#c5ede4',
                200: '#9ee0d2',
                300: '#6ed1be',
                400: '#45c5ae',
                500: '#20B29C',
                600: '#1a9a86',
                700: '#14806f',
                800: '#0e6659',
                900: '#084c42',
              },
              // PROPIO Dark — Grafito profundo
              dark: {
                50: '#f4f5f7',
                100: '#e3e4e8',
                200: '#c5c8d0',
                300: '#a3a7b3',
                400: '#818697',
                500: '#2F3542',
                600: '#252a35',
                700: '#1b1f28',
                800: '#11141b',
                900: '#070a0e',
              },
              // PROPIO Ivory — Marfil (fondos)
              ivory: {
                DEFAULT: '#F6F3EE',
                dark: '#e8e3da',
              },
              // Legacy brand map (para compatibilidad con código antiguo)
              brand: {
                50: '#e8f8f4',
                100: '#c5ede4',
                500: '#20B29C',
                600: '#1a9a86',
                700: '#14806f',
                900: '#084c42',
              }
            },
            fontFamily: { sans: ['Plus Jakarta Sans', 'system-ui', 'sans-serif'] }
          }
        }
      }
    </script>
    <title>Código de Caballeros · Reservas</title>
    <style>
      body { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
      .safe-bottom { padding-bottom: env(safe-area-inset-bottom, 0px); }
      .pill { padding: 0.75rem 1rem; border-radius: 1rem; font-size: 0.875rem; font-weight: 600; transition: all 0.15s; }
      .pill:active { transform: scale(0.95); }
      .pill-primary { @apply pill bg-propio-500 text-white shadow-lg; padding: 0.75rem 1rem; border-radius: 1rem; font-weight: 600; background-color: #20B29C; color: white; box-shadow: 0 10px 15px -3px rgba(32, 178, 156, 0.25); }
      .pill-outline { padding: 0.75rem 1rem; border-radius: 1rem; font-weight: 600; background-color: white; border: 1px solid #e7e5e4; color: #44403c; }
      .pill-active { padding: 0.75rem 1rem; border-radius: 1rem; font-weight: 600; background-color: #20B29C; color: white; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
      .input-el { width: 100%; padding: 1rem; border-radius: 1rem; background: white; border: 1px solid #e7e5e4; font-size: 1rem; outline: none; transition: all 0.15s; }
      .input-el:focus { border-color: #20B29C; box-shadow: 0 0 0 3px rgba(32, 178, 156, 0.25); }
      .card { background: white; border-radius: 1.5rem; padding: 1.25rem; box-shadow: 0 1px 2px rgba(0,0,0,0.05); border: 1px solid #f5f5f4; }

      /* ── Splash screen (visible while React loads) ── */
      #splash {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        background: linear-gradient(160deg, #F6F3EE 0%, #f0ece4 100%);
        transition: opacity 0.5s ease, visibility 0.5s ease;
      }
      #splash.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
      #splash img { width: 56px; height: 56px; opacity: 0.8; animation: splashPulse 1.8s ease-in-out infinite; }
      #splash .splash-brand { margin-top: 16px; font-size: 18px; font-weight: 800; color: #2F3542; letter-spacing: -0.02em; }
      #splash .splash-sub { margin-top: 4px; font-size: 11px; color: #a8a29e; letter-spacing: 0.04em; font-weight: 500; }
      #splash .splash-dots { margin-top: 24px; display: flex; gap: 6px; }
      #splash .splash-dots span {
        width: 6px; height: 6px; border-radius: 50%; background: #20B29C;
        animation: splashDot 1.4s ease-in-out infinite;
      }
      #splash .splash-dots span:nth-child(2) { animation-delay: 0.2s; }
      #splash .splash-dots span:nth-child(3) { animation-delay: 0.4s; }
      @keyframes splashPulse {
        0%, 100% { opacity: 0.6; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.08); }
      }
      @keyframes splashDot {
        0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; }
        40% { transform: scale(1); opacity: 1; }
      }

      /* ── Premium transitions ── */
      .premium-ease { transition: all 0.35s cubic-bezier(0.32, 0.72, 0, 1); }
      .premium-ease-slow { transition: all 0.5s cubic-bezier(0.32, 0.72, 0, 1); }

      /* ── PROPIO Design Tokens ── */
      :root {
        --color-propio-50: #e8f8f4;
        --color-propio-100: #c5ede4;
        --color-propio-200: #9ee0d2;
        --color-propio-300: #6ed1be;
        --color-propio-400: #45c5ae;
        --color-propio-500: #20B29C;
        --color-propio-600: #1a9a86;
        --color-propio-700: #14806f;
        --color-propio-800: #0e6659;
        --color-propio-900: #084c42;
        --color-dark-500: #2F3542;
        --color-dark-600: #252a35;
        --color-dark-700: #1b1f28;
        --color-ivory: #F6F3EE;
        --color-ivory-dark: #e8e3da;
      }
    </style>
  </head>
  <body class="bg-ivory text-dark-500 antialiased">
    <!-- Ambient grain (fixed depth layer) -->
    <div style="position:fixed;inset:0;z-index:-1;pointer-events:none;background:radial-gradient(ellipse at 25% 30%,rgba(32,178,156,0.025) 0%,transparent 55%),radial-gradient(ellipse at 75% 70%,rgba(47,53,66,0.012) 0%,transparent 55%)"></div>
    <div id="splash">
      <img src="/propio-icon.svg" alt="" />
      <div class="splash-brand">Código de Caballeros</div>
      <div class="splash-sub">Powered by PROPIO</div>
      <div class="splash-dots"><span></span><span></span><span></span></div>
    </div>
    <div id="root"></div>
    <script>window.API_BASE = 'http://localhost:8000'</script>
    <script type="module" src="/demo.js?v=4"></script>
    <script>
      // Hide splash once React has had time to mount
      window.addEventListener('load', () => {
        requestAnimationFrame(() => {
          setTimeout(() => document.getElementById('splash')?.classList.add('hidden'), 350)
        })
      })
    </script>

  </body>
</html>
